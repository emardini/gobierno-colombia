name: build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Construir markdown completo y Word
        run: python3 build/build.py

      - name: Subir entregables como artefactos
        uses: actions/upload-artifact@v4
        with:
          name: estado-en-el-territorio
          path: |
            programa-completo.md
            dist/estado-en-el-territorio.docx

      - name: Publicar release (solo en etiquetas vX.Y)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            programa-completo.md
            dist/estado-en-el-territorio.docx

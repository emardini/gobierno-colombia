name: Consolidar plan (Markdown + HTML estático)

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/**'
      - '_sidebar.md'
      - 'scripts/build-completo.py'
      - '.github/workflows/consolidar.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  consolidar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install markdown

      - name: Generar plan-completo.md y completo.html
        run: python3 scripts/build-completo.py

      - name: Commit si cambió
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add plan-completo.md completo.html
          git diff --cached --quiet || git commit -m "docs: regenerar plan completo (md + html) [skip ci]"
          git push

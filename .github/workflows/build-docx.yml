name: Build Documentation

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'docs/**'
      - 'scripts/build_markdown.py'
      - '.github/workflows/build-docx.yml'
      - 'CHANGELOG.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.1

      - name: Set up Python
        uses: actions/setup-python@v5.0.0
        with:
          python-version: '3.12'

      - name: Build consolidated markdown
        run: python scripts/build_markdown.py

      - name: Upload consolidated document as artifact
        uses: actions/upload-artifact@v4
        with:
          name: documento-completo
          path: DOCUMENTO-COMPLETO.md

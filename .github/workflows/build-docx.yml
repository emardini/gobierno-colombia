name: Build Documentation

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'docs/**'
      - 'scripts/build_markdown.py'
      - '.github/workflows/build-docx.yml'
      - 'CHANGELOG.md'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.1
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5.0.0
        with:
          python-version: '3.12'

      - name: Build consolidated markdown
        run: python scripts/build_markdown.py

      - name: Push to docs branch
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Checkout docs branch (crear si no existe)
          git fetch origin docs 2>/dev/null || echo "Creating docs branch..."
          git checkout -B docs origin/docs 2>/dev/null || git checkout -b docs

          # Copiar archivo generado
          git checkout ${{ github.ref_name }} -- DOCUMENTO-COMPLETO.md || cp DOCUMENTO-COMPLETO.md .

          # Commit y push
          git add DOCUMENTO-COMPLETO.md
          git commit -m "docs: update from ${{ github.ref_name }}

${{ github.event.head_commit.message }}" || echo "No changes"

          git push origin docs

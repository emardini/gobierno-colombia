name: Build Word Document

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'docs/**'
      - 'scripts/build_docx.py'
      - '.github/workflows/build-docx.yml'
      - 'CHANGELOG.md'

  # También permite ejecutar manualmente desde Actions
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-docx:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.1
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5.0.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-docx==0.8.11

      - name: Create dist folder
        run: mkdir -p dist

      - name: Build Word document
        run: python scripts/build_docx.py

      - name: Check build result
        run: |
          if [ -f dist/Estado-en-el-Territorio.docx ]; then
            echo "✅ Build successful!"
            ls -lh dist/
          else
            echo "❌ Build failed - document not generated"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4.3.1
        if: success()
        with:
          name: Estado-en-el-Territorio-Document
          path: dist/*.docx
          retention-days: 90

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Estado-en-el-Territorio.docx
          tag_name: build-${{ github.run_number }}
          name: Estado en el Territorio - Build ${{ github.run_number }}
          prerelease: false
          body: |
            Documento generado automáticamente

            **Branch:** ${{ github.ref_name }}
            **Commit:** ${{ github.event.head_commit.message }}
            **Author:** ${{ github.event.head_commit.author.name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

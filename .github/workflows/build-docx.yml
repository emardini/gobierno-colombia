name: Build Documentation

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'docs/**'
      - 'scripts/build_markdown.py'
      - '.github/workflows/build-docx.yml'
      - 'CHANGELOG.md'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.1
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5.0.0
        with:
          python-version: '3.12'

      - name: Build consolidated markdown
        run: python scripts/build_markdown.py

      - name: Push to docs branch
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Crear/actualizar rama docs
          git checkout --orphan docs-temp 2>/dev/null || git checkout -b docs-temp
          git reset

          # Copiar solo el documento
          cp DOCUMENTO-COMPLETO.md .
          git add DOCUMENTO-COMPLETO.md
          git commit -m "docs: consolidated document from ${{ github.ref_name }}"

          # Push a docs
          git push -f origin docs-temp:docs || git push origin docs-temp:docs

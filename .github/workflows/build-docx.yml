name: Build Word Document

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'docs/**'
      - 'scripts/build_docx.py'
      - '.github/workflows/build-docx.yml'
      - 'CHANGELOG.md'

  # También permite ejecutar manualmente desde Actions
  workflow_dispatch:

jobs:
  build-docx:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-docx==0.8.11

      - name: Create dist folder
        run: mkdir -p dist

      - name: Build Word document
        run: python scripts/build_docx.py

      - name: Check build result
        run: |
          if [ -f dist/Estado-en-el-Territorio.docx ]; then
            echo "✅ Build successful!"
            ls -lh dist/
          else
            echo "❌ Build failed - document not generated"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: Estado-en-el-Territorio-Document
          path: dist/Estado-en-el-Territorio.docx
          retention-days: 90
          compression-level: 0

      - name: Create Release (on main branch)
        if: github.ref == 'refs/heads/main' && success()
        uses: softprops/action-gh-release@v1
        with:
          files: dist/Estado-en-el-Territorio.docx
          tag_name: v${{ github.run_number }}
          body: |
            Documento generado automáticamente en el build #${{ github.run_number }}

            **Fecha:** ${{ github.event.head_commit.timestamp }}
            **Commit:** ${{ github.event.head_commit.message }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
